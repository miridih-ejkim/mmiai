<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', sans-serif; margin: 0; }</style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center">
  <!--
    technique: split-ratio
    variant: 60-40-text-visual
    핵심 기법: grid-cols-[3fr_2fr]로 비율 명시, 양쪽 내부 요소가 각 영역에 맞게 수직 센터링
  -->
  <section class="w-full max-w-5xl mx-auto px-10 py-20 grid grid-cols-[3fr_2fr] gap-16 items-center">
    <!-- 좌: 60% 텍스트 영역 -->
    <div>
      <span class="inline-block text-sm font-semibold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full mb-4">핵심 전략</span>
      <h2 class="text-4xl font-bold text-gray-900 leading-tight mb-5">데이터 기반 의사결정으로<br/>성장을 가속화합니다</h2>
      <p class="text-gray-500 leading-relaxed mb-6">실시간 분석 파이프라인과 ML 예측 모델을 결합하여 고객 행동을 선제적으로 파악하고, 비즈니스 기회를 포착합니다.</p>
      <ul class="space-y-3">
        <li class="flex items-center gap-3">
          <div class="w-6 h-6 rounded-full bg-emerald-100 flex items-center justify-center flex-shrink-0">
            <svg class="w-3.5 h-3.5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
          </div>
          <span class="text-gray-700 text-sm">리포트 생성 시간 87% 단축</span>
        </li>
        <li class="flex items-center gap-3">
          <div class="w-6 h-6 rounded-full bg-emerald-100 flex items-center justify-center flex-shrink-0">
            <svg class="w-3.5 h-3.5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
          </div>
          <span class="text-gray-700 text-sm">예측 정확도 94.2% 달성</span>
        </li>
        <li class="flex items-center gap-3">
          <div class="w-6 h-6 rounded-full bg-emerald-100 flex items-center justify-center flex-shrink-0">
            <svg class="w-3.5 h-3.5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
          </div>
          <span class="text-gray-700 text-sm">의사결정 소요시간 평균 2일 → 3시간</span>
        </li>
      </ul>
    </div>

    <!-- 우: 40% 비주얼 영역 — 내부 콘텐츠가 영역 비율에 맞게 채움 -->
    <div class="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-2xl p-8 aspect-square flex flex-col justify-between">
      <div class="flex items-center justify-between mb-auto">
        <span class="text-xs font-medium text-indigo-500 bg-white px-2.5 py-1 rounded-md shadow-sm">실시간 대시보드</span>
        <div class="flex gap-1">
          <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
          <div class="w-2 h-2 rounded-full bg-gray-300"></div>
          <div class="w-2 h-2 rounded-full bg-gray-300"></div>
        </div>
      </div>
      <!-- 미니 차트 모형 — 영역에 맞는 비율로 배치 -->
      <div class="flex items-end gap-2 h-32 mt-6">
        <div class="flex-1 bg-indigo-200 rounded-t-md" style="height: 40%"></div>
        <div class="flex-1 bg-indigo-300 rounded-t-md" style="height: 65%"></div>
        <div class="flex-1 bg-indigo-400 rounded-t-md" style="height: 50%"></div>
        <div class="flex-1 bg-indigo-300 rounded-t-md" style="height: 75%"></div>
        <div class="flex-1 bg-indigo-500 rounded-t-md" style="height: 90%"></div>
        <div class="flex-1 bg-indigo-400 rounded-t-md" style="height: 60%"></div>
        <div class="flex-1 bg-indigo-600 rounded-t-md" style="height: 100%"></div>
      </div>
      <div class="flex justify-between text-[10px] text-indigo-400 mt-2">
        <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
    </div>
  </section>
</body>
</html>
