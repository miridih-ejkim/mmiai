<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', sans-serif; margin: 0; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <!--
    technique: split-ratio
    variant: 30-70-sidebar-content
    핵심 기법: grid-cols-[1fr_2.5fr], 좁은 사이드바에 네비/라벨, 넓은 메인에 콘텐츠
  -->
  <section class="w-full max-w-5xl mx-auto grid grid-cols-[1fr_2.5fr] min-h-[480px] rounded-2xl overflow-hidden shadow-lg">
    <!-- 좌: 30% 사이드바 — 색상 배경 + 수직 라벨 목록 -->
    <div class="bg-indigo-900 text-white p-8 flex flex-col justify-between">
      <div>
        <h3 class="text-lg font-bold mb-1">프로젝트 현황</h3>
        <p class="text-indigo-300 text-xs mb-8">2024 Q3 요약</p>
        <nav class="space-y-4">
          <div class="flex items-center gap-3 bg-white/10 rounded-lg px-4 py-3">
            <div class="w-2 h-2 rounded-full bg-emerald-400"></div>
            <span class="text-sm font-medium">진행 중</span>
            <span class="ml-auto text-sm font-bold">12</span>
          </div>
          <div class="flex items-center gap-3 px-4 py-3">
            <div class="w-2 h-2 rounded-full bg-amber-400"></div>
            <span class="text-sm text-indigo-200">검토 대기</span>
            <span class="ml-auto text-sm text-indigo-300">5</span>
          </div>
          <div class="flex items-center gap-3 px-4 py-3">
            <div class="w-2 h-2 rounded-full bg-blue-400"></div>
            <span class="text-sm text-indigo-200">완료</span>
            <span class="ml-auto text-sm text-indigo-300">38</span>
          </div>
          <div class="flex items-center gap-3 px-4 py-3">
            <div class="w-2 h-2 rounded-full bg-red-400"></div>
            <span class="text-sm text-indigo-200">지연</span>
            <span class="ml-auto text-sm text-indigo-300">2</span>
          </div>
        </nav>
      </div>
      <div class="text-xs text-indigo-400">최종 업데이트: 2024.09.15</div>
    </div>

    <!-- 우: 70% 메인 콘텐츠 — 카드, 지표 등 -->
    <div class="bg-white p-10">
      <div class="flex items-center justify-between mb-8">
        <h2 class="text-2xl font-bold text-gray-900">이번 분기 하이라이트</h2>
        <span class="text-xs text-gray-400 bg-gray-100 px-3 py-1.5 rounded-full">전체 57건</span>
      </div>

      <!-- 지표 카드 row — 메인 영역 비율에 맞게 3등분 -->
      <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="bg-emerald-50 rounded-xl p-5">
          <div class="text-2xl font-extrabold text-emerald-700">94%</div>
          <div class="text-xs text-emerald-600 mt-1">일정 준수율</div>
        </div>
        <div class="bg-blue-50 rounded-xl p-5">
          <div class="text-2xl font-extrabold text-blue-700">4.2일</div>
          <div class="text-xs text-blue-600 mt-1">평균 리드타임</div>
        </div>
        <div class="bg-amber-50 rounded-xl p-5">
          <div class="text-2xl font-extrabold text-amber-700">8명</div>
          <div class="text-xs text-amber-600 mt-1">투입 인원</div>
        </div>
      </div>

      <!-- 간단한 항목 리스트 -->
      <div class="space-y-3">
        <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-xl">
          <div class="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-xs">01</div>
          <div class="flex-1">
            <div class="text-sm font-semibold text-gray-800">인증 시스템 리팩토링</div>
            <div class="text-xs text-gray-400">Backend · 진행률 85%</div>
          </div>
          <div class="w-24 h-2 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full bg-indigo-500 rounded-full" style="width: 85%"></div>
          </div>
        </div>
        <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-xl">
          <div class="w-8 h-8 rounded-lg bg-emerald-100 flex items-center justify-center text-emerald-600 font-bold text-xs">02</div>
          <div class="flex-1">
            <div class="text-sm font-semibold text-gray-800">대시보드 v2 디자인</div>
            <div class="text-xs text-gray-400">Frontend · 진행률 60%</div>
          </div>
          <div class="w-24 h-2 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full bg-emerald-500 rounded-full" style="width: 60%"></div>
          </div>
        </div>
        <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-xl">
          <div class="w-8 h-8 rounded-lg bg-amber-100 flex items-center justify-center text-amber-600 font-bold text-xs">03</div>
          <div class="flex-1">
            <div class="text-sm font-semibold text-gray-800">데이터 파이프라인 마이그레이션</div>
            <div class="text-xs text-gray-400">Data · 진행률 40%</div>
          </div>
          <div class="w-24 h-2 bg-gray-200 rounded-full overflow-hidden">
            <div class="h-full bg-amber-500 rounded-full" style="width: 40%"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
