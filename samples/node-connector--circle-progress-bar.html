<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-8">
  <div class="max-w-xl mx-auto my-4 border-b-2 pb-4">
    <div class="flex pb-3">
      <div class="flex-1"></div>

      <div class="flex-1">
        <div class="w-10 h-10 bg-green-500 mx-auto rounded-full text-lg text-white flex items-center">
          <span class="text-white text-center w-full">
            <svg class="w-4 h-4 mx-auto fill-current" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </span>
        </div>
      </div>

      <div class="w-1/6 align-center items-center align-middle content-center flex">
        <div class="w-full bg-gray-200 rounded items-center align-middle align-center flex-1">
          <div class="bg-green-300 text-xs leading-none py-1 text-center rounded" style="width: 100%"></div>
        </div>
      </div>

      <div class="flex-1">
        <div class="w-10 h-10 bg-green-500 mx-auto rounded-full text-lg text-white flex items-center">
          <span class="text-white text-center w-full">
            <svg class="w-4 h-4 mx-auto fill-current" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </span>
        </div>
      </div>

      <div class="w-1/6 align-center items-center align-middle content-center flex">
        <div class="w-full bg-gray-200 rounded items-center align-middle align-center flex-1">
          <div class="bg-green-300 text-xs leading-none py-1 text-center rounded" style="width: 20%"></div>
        </div>
      </div>

      <div class="flex-1">
        <div class="w-10 h-10 bg-white border-2 border-gray-300 mx-auto rounded-full text-lg text-white flex items-center">
          <span class="text-gray-600 text-center w-full">3</span>
        </div>
      </div>

      <div class="w-1/6 align-center items-center align-middle content-center flex">
        <div class="w-full bg-gray-200 rounded items-center align-middle align-center flex-1">
          <div class="bg-green-300 text-xs leading-none py-1 text-center rounded" style="width: 0%"></div>
        </div>
      </div>

      <div class="flex-1">
        <div class="w-10 h-10 bg-white border-2 border-gray-300 mx-auto rounded-full text-lg text-white flex items-center">
          <span class="text-gray-600 text-center w-full">4</span>
        </div>
      </div>

      <div class="flex-1"></div>
    </div>

    <div class="flex text-xs content-center text-center">
      <div class="w-1/4">Invitation received</div>
      <div class="w-1/4">Personal details</div>
      <div class="w-1/4">Application details</div>
      <div class="w-1/4">Confirmation</div>
    </div>
  </div>
</body>
</html>
