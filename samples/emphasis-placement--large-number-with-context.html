<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', sans-serif; margin: 0; }</style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">
  <!--
    technique: emphasis-placement
    variant: large-number-with-context
    핵심 기법:
    - 큰 숫자(KPI)는 카드 최상단에 앵커, 시각 계층 1순위
    - 바로 아래에 라벨(무엇의 숫자인지), 그 아래 보조 지표(변화율)
    - 숫자 크기 대비(5xl vs xs)로 시선 유도
  -->
  <section class="w-full max-w-5xl mx-auto px-10 py-20">
    <div class="text-center mb-14">
      <h2 class="text-3xl font-bold text-white mb-2">핵심 성과</h2>
      <p class="text-slate-400">2024년 3분기 대비 전분기 비교</p>
    </div>

    <div class="grid grid-cols-3 gap-8">
      <!-- 카드 1: 메인 KPI — 숫자 앵커 상단 -->
      <div class="bg-slate-800 rounded-2xl p-8 border border-slate-700">
        <!-- 1순위: 큰 숫자 -->
        <div class="text-5xl font-black text-white tracking-tight">₩2.4B</div>
        <!-- 2순위: 라벨 (무엇의 숫자인가) -->
        <div class="text-sm text-slate-400 mt-2 mb-4">분기 매출액</div>
        <!-- 3순위: 변화율 배지 -->
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center gap-1 text-xs font-semibold text-emerald-400 bg-emerald-400/10 px-2.5 py-1 rounded-full">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
            +23.5%
          </span>
          <span class="text-xs text-slate-500">vs Q2</span>
        </div>
        <!-- 4순위: 보조 맥락 (미니 바 차트) -->
        <div class="flex items-end gap-1.5 h-10 mt-6">
          <div class="flex-1 bg-slate-700 rounded-sm" style="height: 30%"></div>
          <div class="flex-1 bg-slate-700 rounded-sm" style="height: 45%"></div>
          <div class="flex-1 bg-slate-700 rounded-sm" style="height: 55%"></div>
          <div class="flex-1 bg-slate-600 rounded-sm" style="height: 70%"></div>
          <div class="flex-1 bg-indigo-500 rounded-sm" style="height: 100%"></div>
        </div>
        <div class="flex justify-between text-[9px] text-slate-600 mt-1">
          <span>Q1'23</span><span>Q2</span><span>Q3</span><span>Q4</span><span class="text-indigo-400 font-medium">Q1'24</span>
        </div>
      </div>

      <!-- 카드 2 -->
      <div class="bg-slate-800 rounded-2xl p-8 border border-slate-700">
        <div class="text-5xl font-black text-white tracking-tight">158K</div>
        <div class="text-sm text-slate-400 mt-2 mb-4">월간 활성 사용자</div>
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center gap-1 text-xs font-semibold text-emerald-400 bg-emerald-400/10 px-2.5 py-1 rounded-full">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
            +41.2%
          </span>
          <span class="text-xs text-slate-500">vs Q2</span>
        </div>
        <div class="flex items-end gap-1.5 h-10 mt-6">
          <div class="flex-1 bg-slate-700 rounded-sm" style="height: 20%"></div>
          <div class="flex-1 bg-slate-700 rounded-sm" style="height: 35%"></div>
          <div class="flex-1 bg-slate-700 rounded-sm" style="height: 50%"></div>
          <div class="flex-1 bg-slate-600 rounded-sm" style="height: 65%"></div>
          <div class="flex-1 bg-violet-500 rounded-sm" style="height: 100%"></div>
        </div>
        <div class="flex justify-between text-[9px] text-slate-600 mt-1">
          <span>Q1'23</span><span>Q2</span><span>Q3</span><span>Q4</span><span class="text-violet-400 font-medium">Q1'24</span>
        </div>
      </div>

      <!-- 카드 3 -->
      <div class="bg-slate-800 rounded-2xl p-8 border border-slate-700">
        <div class="text-5xl font-black text-white tracking-tight">8.7%</div>
        <div class="text-sm text-slate-400 mt-2 mb-4">전환율</div>
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center gap-1 text-xs font-semibold text-emerald-400 bg-emerald-400/10 px-2.5 py-1 rounded-full">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
            +2.1%p
          </span>
          <span class="text-xs text-slate-500">vs Q2</span>
        </div>
        <div class="flex items-end gap-1.5 h-10 mt-6">
          <div class="flex-1 bg-slate-700 rounded-sm" style="height: 50%"></div>
          <div class="flex-1 bg-slate-700 rounded-sm" style="height: 55%"></div>
          <div class="flex-1 bg-slate-700 rounded-sm" style="height: 60%"></div>
          <div class="flex-1 bg-slate-600 rounded-sm" style="height: 72%"></div>
          <div class="flex-1 bg-amber-500 rounded-sm" style="height: 100%"></div>
        </div>
        <div class="flex justify-between text-[9px] text-slate-600 mt-1">
          <span>Q1'23</span><span>Q2</span><span>Q3</span><span>Q4</span><span class="text-amber-400 font-medium">Q1'24</span>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
