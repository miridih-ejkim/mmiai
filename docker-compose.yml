services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: miai
      POSTGRES_PASSWORD: password
      POSTGRES_DB: miai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miai"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "4111:4111"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://miai:password@postgres:5432/miai
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - MASTRA_SERVER_URL=http://server:4111
      - DATABASE_URL=postgresql://miai:password@postgres:5432/miai
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

volumes:
  pgdata:
