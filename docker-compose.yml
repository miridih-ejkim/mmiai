services:
  postgres:
    platform: linux/amd64
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: miai
      POSTGRES_PASSWORD: password
      POSTGRES_DB: miai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miai"]
      interval: 3s
      timeout: 3s
      retries: 10

  server:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "4111:4111"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://miai:password@postgres:5432/miai
    depends_on:
      postgres:
        condition: service_healthy

  web:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - MASTRA_SERVER_URL=http://server:4111
      - DATABASE_URL=postgresql://miai:password@postgres:5432/miai
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

volumes:
  pgdata:
